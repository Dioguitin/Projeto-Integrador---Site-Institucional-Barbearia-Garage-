<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">
  <meta charset="UTF-8">
  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Agendamento | Garage Barbearia</title>

  <link rel="stylesheet" href="agendamento.css">
  <link rel="stylesheet" href="agendamento-responsive.css">
</head>

<body class="pagina-agendamento">


<header class="header">

  <div class="header-container">

    <a href="index.html" class="logo">
      GARAGE
    </a>

    <nav class="nav">

      <a href="index.html">
        Início
      </a>

      <a href="Sobre.html">
        Sobre
      </a>

      <a href="servicos.html">
        Serviços
      </a>

      <a href="agendamento.html" class="active">
        Agendamento
      </a>

      <a href="contato.html">
        Contato
      </a>

    </nav>

  </div>

</header>

<section class="agendamento-page">

  <div class="agendamento-content">

    <div class="hero-text">
      <p class="tag">Agendamento Online</p>

      <h1 class="title">
        Agende seu <br />
        <span>horário</span>
      </h1>

      <p class="subtitle">
        Preencha os dados abaixo e envie sua solicitação diretamente para o WhatsApp da barbearia.
      </p>
    </div>

    <form id="form-agendamento" class="form-agendamento">

      <div class="form-group service-wrapper">

  <label for="servico">
    Serviço
  </label>

  <select id="servico" required>

    <option value="">Selecione o serviço</option>

    <option value="Cabelo">Cabelo</option>
    <option value="Barba e Bigode">Barba e Bigode</option>
    <option value="Combo">Combo</option>
    <option value="Manicure Masculina">Manicure Masculina</option>
    <option value="Pedicure Masculina">Pedicure Masculina</option>
    <option value="Spa dos Pés">Spa dos Pés</option>
    <option value="Reflexo / Luzes">Reflexo / Luzes</option>
    <option value="Sobrancelha">Sobrancelha</option>
    <option value="Cabelo - Penteados">Cabelo - Penteados</option>

  </select>

  <div class="service-icon">

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.7"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="6" cy="6" r="3"></circle>
      <path d="M8.12 8.12 12 12"></path>
      <path d="M20 4 8.12 15.88"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <path d="M14.8 14.8 20 20"></path>
    </svg>

  </div>

</div>

<div class="form-group date-wrapper">

  <label for="data">
    Data desejada
  </label>

  <input
    type="date"
    id="data"
    class="campo-data"
    required
  >

  <div class="date-icon">

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.7"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <rect
        x="3"
        y="4"
        width="18"
        height="18"
        rx="2"
      />

      <line x1="16" y1="2" x2="16" y2="6" />

      <line x1="8" y1="2" x2="8" y2="6" />

      <line x1="3" y1="10" x2="21" y2="10" />
    </svg>

  </div>

</div>

      <div class="form-group time-wrapper">

  <label for="hora">
    Horário desejado
  </label>

  <select id="hora" required>

    <option value="">Selecione o horário</option>

    <optgroup label="Manhã">
      <option value="09:00">09:00</option>
      <option value="09:30">09:30</option>
      <option value="10:00">10:00</option>
      <option value="10:30">10:30</option>
      <option value="11:00">11:00</option>
      <option value="11:30">11:30</option>
    </optgroup>

    <!-- restante dos horários -->

  </select>

  <div class="time-icon">

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.7"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="10"></circle>
      <polyline points="12 6 12 12 16 14"></polyline>
    </svg>

  </div>

</div>

      <div class="form-group professional-wrapper">

  <label for="barbeiro">
    Profissional
  </label>

  <select id="barbeiro" required>

    <option value="">Selecione o profissional</option>

    <option value="Xandinho">Xandinho</option>
    <option value="João">João</option>
    <option value="Sem preferência">Sem preferência</option>

  </select>

  <div class="professional-icon">

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.7"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>

  </div>

</div>
</section>

<script>
  const campoData = document.getElementById("data");

  campoData.addEventListener("click", function() {
    if (typeof campoData.showPicker === "function") {
      campoData.showPicker();
    }
  });

  const hoje = new Date().toISOString().split("T")[0];

  campoData.setAttribute("min", hoje);

  const form = document.getElementById("form-agendamento");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const servico = document.getElementById("servico").value;
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const barbeiro = document.getElementById("barbeiro").value;

    if (!servico || !data || !hora || !barbeiro) {
      alert("Preencha todos os campos!");
      return;
    }

    const dataSelecionada = new Date(data + "T00:00:00");

    if (dataSelecionada.getDay() === 0) {
      alert("A barbearia não funciona aos domingos. Por favor, escolha outra data.");
      return;
    }

    const numeroBarbearia = "5581999112609";

    const dataFormatada = formatarData(data);

    const mensagem = `Olá! Gostaria de agendar ${servico} no dia ${dataFormatada}, às ${hora}, com ${barbeiro}.`;

    const mensagemCodificada = encodeURIComponent(mensagem);

    const linkWhatsApp = `https://wa.me/${numeroBarbearia}?text=${mensagemCodificada}`;

    window.open(linkWhatsApp, "_blank");
  });

  function formatarData(data) {
    const partes = data.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }
</script>

</body>
</html>
